<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>QR Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0b0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: #0a0a0a;
        }
        .card {
            background: #1a1a2e;
            border-radius: 30px;
            padding: 30px 20px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }
        .card h1 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 6px;
        }
        .card p {
            color: #8899bb;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .scanner-box {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #25d366;
            box-shadow: 0 0 40px #25d36633;
        }
        .scanner-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .scanner-box .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .scanner-box .overlay .frame {
            width: 70%;
            height: 70%;
            border: 3px solid #25d366;
            border-radius: 16px;
            box-shadow: 0 0 30px #25d36655;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.02);
            }
        }
        .status {
            margin-top: 18px;
            color: #25d366;
            font-size: 14px;
            font-weight: 600;
        }
        .status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #25d366;
            border-radius: 50%;
            animation: blink 1s infinite;
            margin-right: 8px;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .btn-stop {
            margin-top: 20px;
            padding: 12px 30px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-stop:hover {
            background: #c0392b;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 20px;
            color: #4a5f85;
            font-size: 11px;
        }
        .alert {
            background: #ff3b3033;
